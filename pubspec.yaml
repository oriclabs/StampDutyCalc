name: stamp_duty_calc
description: "Vehicle Stamp Duty Calculator for Australia & New Zealand"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  fl_chart: ^0.69.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  macos:
    generate: true
  windows:
    generate: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#F4811F"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/rates/
    - assets/icon/
